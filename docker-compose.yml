version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: nunyacollect_db
    restart: always
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=nunyacollect
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: nunyacollect_redis
    restart: always
    ports:
      - '6379:6379'

volumes:
  postgres_data:
